<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SailFrames Fleet Health</title>
    <link rel="stylesheet" href="./assets/css/main.css?v=10">
    <script src="./config.js"></script>
    <script src="./assets/js/analytics.js"></script>
    <style>
        html, body { overflow: auto; height: auto; }
        body { padding-bottom: 60px; }
        .fleet-wrap {
            max-width: 1400px;
            margin: 80px auto 20px;
            padding: 0 16px;
        }
        .fleet-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .fleet-toolbar h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--text-primary);
        }
        .fleet-toolbar input.filter {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color, #2a2a2a);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            min-width: 240px;
            flex: 1;
        }
        .fleet-toolbar .meta {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: ui-monospace, Menlo, monospace;
        }
        .fleet-toolbar button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .fleet-toolbar button:disabled { opacity: 0.5; cursor: wait; }

        .fleet-table-wrap {
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 1px solid var(--border-color, #2a2a2a);
            overflow-x: auto;
        }
        table.fleet {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        table.fleet thead th {
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color, #333);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        table.fleet thead th:hover { color: var(--text-primary); }
        table.fleet thead th.sort-asc::after  { content: " ▲"; opacity: 0.7; }
        table.fleet thead th.sort-desc::after { content: " ▼"; opacity: 0.7; }
        table.fleet tbody td {
            padding: 9px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-primary);
            white-space: nowrap;
            vertical-align: middle;
        }
        table.fleet tbody tr:hover td { background: rgba(255,255,255,0.02); }
        table.fleet tbody tr.missing td {
            opacity: 0.45;
            font-style: italic;
        }
        table.fleet tbody tr.stale td { background: rgba(239, 68, 68, 0.06); }
        table.fleet tbody tr.warn  td { background: rgba(234, 179, 8, 0.05); }
        table.fleet td.bad  { color: #ef4444; font-weight: 600; }
        table.fleet td.warn { color: #eab308; font-weight: 600; }
        table.fleet td.ok   { color: #22c55e; }
        table.fleet td.boat-id {
            font-weight: 700;
            font-size: 0.96rem;
            color: var(--text-primary);
        }
        table.fleet td.muted { color: var(--text-secondary); }
        .fleet-empty {
            padding: 30px;
            text-align: center;
            color: var(--text-secondary);
        }
        @media (max-width: 600px) {
            .fleet-toolbar h1 { font-size: 1.3rem; }
            .fleet-toolbar input.filter { min-width: 180px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-logo">SailFrames</a>
        <div class="nav-links">
            <a href="./races.html" class="nav-link">Races</a>
            <a href="./fleet.html" class="nav-link primary">Fleet</a>
            <a href="./battery.html" class="nav-link">Battery</a>
        </div>
    </nav>

    <div class="fleet-wrap">
        <div class="fleet-toolbar">
            <h1>Fleet Health</h1>
            <input type="search" class="filter" id="filter-input" placeholder="filter (E1, low battery, no fix, ...)">
            <span class="meta" id="last-refresh">—</span>
            <button id="refresh-btn">Refresh</button>
        </div>
        <div class="fleet-table-wrap">
            <table class="fleet">
                <thead>
                    <tr id="header-row"></tr>
                </thead>
                <tbody id="tbody">
                    <tr><td class="fleet-empty" colspan="19">Loading fleet snapshots…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
    // -- Data model -------------------------------------------------
    const BUCKET_BASE = 'https://sailframes-fleet-data-prod.s3.us-east-1.amazonaws.com';
    // Self-hosted (MinIO) reads the per-boat status files through the API
    // proxy; cloud keeps reading the bucket directly. Toggled by config.js.
    const API_BASE = window.SAILFRAMES_API_URL || window.location.origin;
    const FLEET_VIA_API = !!window.SAILFRAMES_FLEET_VIA_API;
    const BOATS = ['E1', 'E2', 'E3', 'E4', 'E5', 'E6'];

    // -- Named locations -------------------------------------------
    // Geofence the boat's reported last_position against known places.
    // Radius in meters; first match wins (order from most-specific to
    // most-general). Polygon places use {polygon:[[lat,lon],...]} for
    // catch-all classifications.
    //
    // Dock coordinates are approximate (web-lookup + map estimation);
    // 200 m radius is generous so slight inaccuracy still captures the
    // boat-at-the-dock case. Refine if any boat consistently shows as
    // raw lat/lon when it should be classified.
    const PLACES = [
        // Home (paul2's residence)
        { name: "Paul's Home",                 lat: 42.30818, lon: -71.17061, radius_m: 100 },
        // Boston-area sailing venues
        { name: 'Courageous Sailing Dock',     lat: 42.3735,  lon: -71.0508,  radius_m: 200 }, // Pier 4 Charlestown Navy Yard
        { name: 'Piers Park Sailing Center',   lat: 42.36500, lon: -71.03639, radius_m: 200 }, // 95 Marginal St, East Boston
        { name: 'MIT Sailing Pavilion',        lat: 42.3585,  lon: -71.0907,  radius_m: 200 }, // 134 Memorial Dr, Cambridge (Charles River)
        { name: 'Savin Hill Yacht Club',       lat: 42.30965, lon: -71.04363, radius_m: 200 }, // 400 Morrissey Blvd, Dorchester
        // Broad bounding boxes as fallback "on water" classifications
        { name: 'Charles River basin',
          polygon: [[42.350, -71.110], [42.350, -71.070], [42.370, -71.070], [42.370, -71.110]] },
        { name: 'Boston Harbor',
          polygon: [[42.300, -71.080], [42.300, -70.880], [42.420, -70.880], [42.420, -71.080]] },
    ];

    function haversineMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const toRad = d => d * Math.PI / 180;
        const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function pointInPolygon(lat, lon, poly) {
        // poly is [[lat,lon],...] interpreted as a simple closed polygon
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const [yi, xi] = poly[i], [yj, xj] = poly[j];
            const intersect = ((yi > lat) !== (yj > lat))
                && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }
    function classifyLocation(lat, lon) {
        if (!lat || !lon || (lat === 0 && lon === 0)) return null;
        for (const p of PLACES) {
            if (p.polygon) {
                if (pointInPolygon(lat, lon, p.polygon)) return p.name;
            } else if (p.radius_m != null) {
                if (haversineMeters(lat, lon, p.lat, p.lon) <= p.radius_m) return p.name;
            }
        }
        return null;
    }
    function fmtLastSailFolder(name) {
        // YYYYMMDD_HHMMSS → "May 22 17:03"
        if (!name) return '';
        const m = name.match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})$/);
        if (!m) return name;  // session_NNN fallback
        const [, y, mo, d, h, mi] = m;
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${monthNames[+mo - 1]} ${+d} ${h}:${mi}`;
    }
    function lastSailEpochMs(name) {
        const m = name && name.match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})$/);
        if (!m) return -1;
        return Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]);
    }

    // Each column: key (sortable value), label (header text),
    // render(row) -> {text, cls?}. Comparators default to natural
    // sort on the key value.
    const COLUMNS = [
        { key: 'boat',     label: 'Boat',  get: r => r.data?.boat_id || r.boat, render: v => ({text: v, cls: 'boat-id'}) },
        { key: 'age_s',    label: 'Age',   get: r => r.ageSec ?? Infinity,
          render: (v, r) => ({text: r.missing ? '—' : fmtAge(v), cls: r.missing ? 'muted' : (v > 86400 ? 'bad' : v > 3600 ? 'warn' : 'ok')}) },
        { key: 'last_sail', label: 'Last sail', get: r => lastSailEpochMs(r.data?.last_sail_folder),
          render: (v, r) => {
              const f = r.data?.last_sail_folder;
              if (!f) return {text: '—', cls: 'muted'};
              return {text: fmtLastSailFolder(f), cls: v < 0 ? 'muted' : ''};
          } },
        { key: 'pending', label: 'Pending', get: r => r.data?.pending_uploads ?? -1,
          render: v => {
              if (v < 0) return {text: '—', cls: 'muted'};
              if (v === 0) return {text: '0', cls: 'ok'};
              return {text: String(v), cls: v > 10 ? 'bad' : 'warn'};
          } },
        { key: 'batt_pct', label: 'Batt %',get: r => r.data?.battery_pct ?? -1,
          render: v => ({text: v < 0 ? '—' : v + '%', cls: v < 0 ? 'muted' : v < 25 ? 'bad' : v < 50 ? 'warn' : 'ok'}) },
        { key: 'batt_v',   label: 'Batt V',get: r => r.data?.battery_v ?? -1,
          render: v => ({text: v < 0 ? '—' : v.toFixed(2) + 'V', cls: 'muted'}) },
        { key: 'gps_fix',  label: 'GPS',   get: r => r.data?.gps_fix || '',
          render: (v, r) => {
              const sats = r.data?.sats ?? 0;
              if (!v || v === 'none' || sats === 0) return {text: 'no fix', cls: 'warn'};
              return {text: `${v} · ${sats} sats`, cls: 'ok'};
          } },
        { key: 'hdop',     label: 'HDOP',  get: r => r.data?.hdop ?? -1,
          render: v => {
              if (v < 0 || v >= 99) return {text: '—', cls: 'muted'};
              const cls = v < 1.5 ? 'ok' : v < 3.0 ? 'warn' : 'bad';
              return {text: v.toFixed(1), cls};
          } },
        { key: 'loc',     label: 'Location', get: r => {
              const p = r.data?.last_position;
              return p ? p.lat * 1e7 + p.lon : -999999999;
          },
          render: (v, r) => {
              const p = r.data?.last_position;
              if (!p || (p.lat === 0 && p.lon === 0)) return {text: '—', cls: 'muted'};
              const named = classifyLocation(p.lat, p.lon);
              if (named) return {text: named, cls: 'ok'};
              return {text: `${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}`, cls: 'muted'};
          } },
        { key: 'sd_free', label: 'SD free', get: r => r.data?.sd_free_mb ?? -1,
          render: v => {
              if (v < 0) return {text: '—', cls: 'muted'};
              const gb = v / 1024;
              const cls = v < 500 ? 'bad' : v < 2000 ? 'warn' : 'muted';
              return {text: gb >= 1 ? `${gb.toFixed(1)} GB` : `${v} MB`, cls};
          } },
        // SD card health — bit-flip / write-corruption rate from the
        // most-recent processed nav.csv. Sourced from raw/<boat>/_sd_health.json
        // which the process_upload Lambda writes after every GPS upload.
        // Tooltip shows the per-category breakdown (bad gps_date / pre-session
        // anchor / lat-lon outlier / row convert error) so you can tell what
        // kind of corruption is happening.
        // Thresholds (per MB):
        //   0      = pristine     → ✓ green
        //   <0.5   = transient    → ✓ muted (one-off events, normal)
        //   <5     = elevated     → ⚠ warn  (watch this card)
        //   ≥5     = failing      → ✗ bad   (replace the card)
        { key: 'sd_health', label: 'SD health',
          get: r => r.sdHealth?.drops_per_mb ?? -1,
          render: (v, r) => {
              const sd = r.sdHealth;
              if (!sd || v < 0) return {text: '—', cls: 'muted'};
              const total = sd.total_dropped || 0;
              const perMb = sd.drops_per_mb || 0;
              const dropList = sd.drops || {};
              const breakdown = Object.entries(dropList)
                  .filter(([k, n]) => n > 0)
                  .map(([k, n]) => `${k}=${n}`).join(' ');
              const tooltip = `last nav: ${(sd.last_nav_bytes/1048576).toFixed(1)} MB\n` +
                              `dropped ${total} of ${sd.total_input_rows} rows\n` +
                              `${perMb.toFixed(2)} corruptions/MB\n` +
                              (breakdown || 'no corruption');
              if (perMb >= 5)  return {text: `✗ ${perMb.toFixed(1)}/MB`, cls: 'bad',  title: tooltip};
              if (perMb >= 0.5) return {text: `⚠ ${perMb.toFixed(2)}/MB`, cls: 'warn', title: tooltip};
              if (perMb > 0)   return {text: `✓ ${perMb.toFixed(2)}/MB`, cls: 'muted', title: tooltip};
              return {text: '✓ clean', cls: 'ok', title: tooltip};
          } },
        { key: 'peers',    label: 'Peers',  get: r => r.data?.espnow_peers ?? -1,
          render: v => ({text: v < 0 ? '—' : `${v}/5`, cls: v < 0 ? 'muted' : v >= 5 ? 'ok' : v >= 1 ? 'warn' : 'bad'}) },
        { key: 'tx',       label: 'TX',    get: r => r.data?.espnow_tx ?? -1,
          render: v => ({text: v < 0 ? '—' : v.toLocaleString(), cls: 'muted'}) },
        { key: 'rx',       label: 'RX',    get: r => r.data?.espnow_rx ?? -1,
          render: v => ({text: v < 0 ? '—' : v.toLocaleString(), cls: 'muted'}) },
        { key: 'wifi',     label: 'WiFi',  get: r => r.data?.wifi_rssi ?? -999,
          render: (v, r) => {
              const ssid = r.data?.wifi_ssid;
              if (!ssid) return {text: '—', cls: 'muted'};
              return {text: `${ssid} ${v}dBm`, cls: v > -65 ? 'ok' : v > -80 ? 'warn' : 'bad'};
          } },
        { key: 'free_heap',label: 'Heap',  get: r => r.data?.free_heap ?? -1,
          render: (v, r) => {
              const m = r.data?.min_heap ?? 0;
              if (v < 0) return {text: '—', cls: 'muted'};
              return {text: `${Math.round(v/1024)} KB (min ${Math.round(m/1024)})`,
                      cls: m < 20000 ? 'bad' : m < 30000 ? 'warn' : 'ok'};
          } },
        { key: 'hw',       label: 'HW',    get: r => r.data?.hardware_platform || '',
          render: (v, r) => {
              if (!v) return {text: '—', cls: 'muted'};
              const imu = r.data.imu_ok ? '✓' : '✗';
              const sd  = r.data.sd_ok  ? '✓' : '✗';
              const bad = !r.data.imu_ok || !r.data.sd_ok;
              return {text: `${v} · IMU ${imu} · SD ${sd}`, cls: bad ? 'bad' : 'muted'};
          } },
        { key: 'role',     label: 'Role',  get: r => r.data?.unit_role || '',
          render: v => ({text: v || '—', cls: 'muted'}) },
        { key: 'fw',       label: 'FW',    get: r => r.data?.version || '',
          render: v => ({text: v || '—', cls: 'muted'}) },
        { key: 'uptime_s', label: 'Uptime',get: r => r.data?.uptime_s ?? -1,
          render: v => ({text: v < 0 ? '—' : fmtUptime(v), cls: 'muted'}) },
    ];

    // -- Helpers ----------------------------------------------------
    function fmtAge(s) {
        if (s === Infinity) return '—';
        if (s < 60) return `${Math.round(s)}s`;
        if (s < 3600) return `${Math.round(s/60)}m`;
        if (s < 86400) return `${(s/3600).toFixed(1)}h`;
        return `${(s/86400).toFixed(1)}d`;
    }
    function fmtUptime(s) {
        if (s < 60) return `${s}s`;
        if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
        const h = Math.floor(s/3600);
        const m = Math.floor((s%3600)/60);
        return `${h}h ${m}m`;
    }
    function rowText(r) {
        if (r.missing) return `${r.boat} missing`;
        const d = r.data;
        return `${d.boat_id} ${d.version} ${d.gps_fix} ${d.wifi_ssid || ''} ${d.unit_role}`
            .toLowerCase();
    }

    // -- Fetch + render ---------------------------------------------
    let state = {
        rows: [],
        sortKey: 'boat',
        sortDir: 'asc',
        filter: '',
    };

    async function fetchOne(boat) {
        const url = FLEET_VIA_API
            ? `${API_BASE}/api/fleet/health/${boat}?t=${Date.now()}`
            : `${BUCKET_BASE}/raw/${boat}/_health.json?t=${Date.now()}`;
        const sdUrl = FLEET_VIA_API
            ? `${API_BASE}/api/fleet/sd-health/${boat}?t=${Date.now()}`
            : `${BUCKET_BASE}/raw/${boat}/_sd_health.json?t=${Date.now()}`;
        try {
            // Fetch both in parallel — SD health is independent of liveness
            // snapshot, so failure of one doesn't poison the other.
            const [r, rsd] = await Promise.all([fetch(url), fetch(sdUrl)]);
            if (!r.ok) return { boat, missing: true };
            const lastModified = r.headers.get('Last-Modified');
            const data = await r.json();
            const ageSec = lastModified
                ? (Date.now() - new Date(lastModified).getTime()) / 1000
                : (Date.now() - Date.parse(data.ts_iso)) / 1000;
            const sdHealth = rsd.ok ? await rsd.json() : null;
            return { boat, data, lastModified, ageSec, sdHealth };
        } catch (e) {
            return { boat, missing: true, error: String(e) };
        }
    }

    function buildHeader() {
        const tr = document.getElementById('header-row');
        tr.innerHTML = '';
        COLUMNS.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col.label;
            th.dataset.key = col.key;
            if (state.sortKey === col.key) {
                th.classList.add(state.sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
            th.addEventListener('click', () => {
                if (state.sortKey === col.key) {
                    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    state.sortKey = col.key;
                    state.sortDir = 'asc';
                }
                renderTable();
            });
            tr.appendChild(th);
        });
    }

    function renderTable() {
        // Sort
        const col = COLUMNS.find(c => c.key === state.sortKey) || COLUMNS[0];
        const dir = state.sortDir === 'asc' ? 1 : -1;
        const sorted = [...state.rows].sort((a, b) => {
            const av = col.get(a), bv = col.get(b);
            if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
            return String(av).localeCompare(String(bv)) * dir;
        });

        // Filter
        const f = state.filter.trim().toLowerCase();
        const visible = f ? sorted.filter(r => rowText(r).includes(f)) : sorted;

        // Render
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        if (visible.length === 0) {
            tbody.innerHTML = `<tr><td class="fleet-empty" colspan="${COLUMNS.length}">no boats match filter</td></tr>`;
            return;
        }
        for (const r of visible) {
            const tr = document.createElement('tr');
            if (r.missing) {
                tr.classList.add('missing');
            } else if (r.ageSec > 86400) {
                tr.classList.add('stale');
            } else if (r.ageSec > 3600) {
                tr.classList.add('warn');
            }
            for (const c of COLUMNS) {
                const td = document.createElement('td');
                const rendered = c.render(c.get(r), r);
                td.textContent = rendered.text;
                if (rendered.cls) td.className = rendered.cls;
                if (rendered.title) td.title = rendered.title;
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
    }

    async function refresh() {
        const btn = document.getElementById('refresh-btn');
        btn.disabled = true;
        state.rows = await Promise.all(BOATS.map(fetchOne));
        renderTable();
        document.getElementById('last-refresh').textContent =
            `refreshed ${new Date().toLocaleTimeString()}`;
        btn.disabled = false;
    }

    // -- Wire up ----------------------------------------------------
    document.getElementById('refresh-btn').addEventListener('click', refresh);
    document.getElementById('filter-input').addEventListener('input', (e) => {
        state.filter = e.target.value;
        renderTable();
    });
    buildHeader();
    refresh();
    setInterval(refresh, 60000);
    </script>
</body>
</html>
