name: Android release

# Builds a signed release APK on a version tag and publishes it as a
# GitHub Release asset — sideload distribution, not the Play Store (see
# the `play-store-upload` job below, disabled until Play Console is set
# up). Independent of docker-publish.yml/deploy-ota.sh: those ship the web
# app and JS-only native updates respectively, this ships a real native
# binary, which is only needed when native code/plugins/capacitor.config.ts
# change (see "Forcing a native update" in docs/native-apps.md).
#
# Signing needs these repo secrets (Settings -> Secrets and variables ->
# Actions). Until they're added, the build still runs but produces an
# unsigned APK (app/build.gradle falls back to no signingConfig when
# keystore.properties is absent) — the "Write release keystore" step below
# is skipped and no release is published.
#   ANDROID_KEYSTORE_BASE64    - `base64 -i release.keystore | pbcopy`
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
# See frontend/android/keystore.properties.example for how to generate
# the keystore itself (one-time, keep it safe — losing it means you can
# never publish an update under the same app identity again).
#
# Tags must be plain `vMAJOR.MINOR.PATCH` (e.g. v1.4.2, no pre-release
# suffix) — the "Derive version from tag" step below turns that into the
# app's versionName ("1.4.2") directly. versionCode instead comes from a
# Unix timestamp in *minutes* (not the tag): Play Store requires versionCode
# to strictly increase on every upload, including repeat uploads for the
# same tag (e.g. rebuilding after a signing fix without cutting a new tag),
# which a value derived only from the tag can't guarantee. Minutes rather
# than seconds because versionCode is a 32-bit int capped by Play Store at
# 2,100,000,000 — an epoch in seconds would hit that ceiling in ~11 years,
# in minutes it's effectively never (millennia).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # to publish the GitHub Release and upload the APK

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # `secrets` isn't a valid context inside `if:` (GitHub Actions only
      # allows it in `run:`/`with:`/`env:`) — route it through `env:` here
      # so the "Write release signing config" step's `if:` can read it.
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # @capacitor/cli requires Node >=22 (`npx cap sync`)
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21" # Capacitor plugins compile with sourceCompatibility 21
                              # (e.g. frontend/android/capacitor-cordova-android-plugins/build.gradle)
          cache: gradle

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web assets (native config)
        working-directory: frontend
        run: |
          cp .env.native.example .env.native
          set -a && source .env.native && set +a
          npm run build

      - name: Sync Capacitor Android project
        working-directory: frontend
        run: npx cap sync android

      # No tag (workflow_dispatch test run) -> gradle_args stays empty and
      # app/build.gradle's own defaults (versionCode 1, versionName
      # "0.0.0-dev") apply. Those runs never publish anyway (see the
      # "Publish GitHub Release" step's tag guard below).
      - name: Derive version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            CODE=$(( $(date -u +%s) / 60 ))
            echo "gradle_args=-PandroidVersionName=$VERSION -PandroidVersionCode=$CODE" >> "$GITHUB_OUTPUT"
          else
            echo "gradle_args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release signing config
        if: env.HAS_ANDROID_SIGNING == 'true'
        working-directory: frontend/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon ${{ steps.version.outputs.gradle_args }}

      - name: Locate APK
        id: apk
        run: echo "path=$(find frontend/android/app/build/outputs/apk/release -name '*.apk' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Clean up signing material
        if: always()
        working-directory: frontend/android
        run: rm -f release.keystore keystore.properties

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgsail-android-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.path }}

      # Only publishes a Release on an actual version tag — workflow_dispatch
      # runs (e.g. to sanity-check the build) stop at the artifact above.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true

  # Disabled scaffold: uploads a signed build to the Play Store's internal
  # testing track via Fastlane `supply` instead of/alongside the GitHub
  # Release above. To enable: create a Play Console service account, add its
  # JSON as the PLAY_SERVICE_ACCOUNT_JSON secret, flesh out the steps below
  # (fastlane install + `supply` invocation), then flip `if: false` to `if:
  # true`.
  #
  # IMPORTANT: don't reuse the `build` job's APK artifact as-is — it's built
  # with VITE_APP_DISTRIBUTION=sideload (.env.native.example), which keeps
  # the in-app Buy Me a Coffee links (config/platform.ts). The store build
  # must rebuild the web assets with VITE_APP_DISTRIBUTION=store set instead,
  # so those links are hidden in favor of the Play Store's own donation
  # system — then run `npx cap sync android` + `gradlew assembleRelease`
  # again on that build before uploading to `supply`.
  play-store-upload:
    needs: build
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Play Store upload not yet configured — see comment above this job in android-release.yml."
