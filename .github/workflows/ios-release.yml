name: iOS release

# Scaffold only — the job is disabled (`if: false`) until there's a paid
# Apple Developer Program account to go with it. Unlike Android
# (android-release.yml), iOS has no self-signed path to an installable
# build: even a build meant only for internal testing must be signed with
# an Apple-issued certificate, so nothing here can run at all without that
# account. See "Why Bearer auth for native" and "Testing without a paid
# Apple account" in docs/native-apps.md for other places this same gate
# already shows up (Bearer auth, the Share Extension).
#
# To enable once the account exists:
#   1. Set up Fastlane (`fastlane init` in frontend/ios/App) with `match`
#      for cert/profile management — needs a private git repo to hold the
#      synced certs, plus these secrets: MATCH_GIT_URL,
#      MATCH_GIT_BASIC_AUTHORIZATION, MATCH_PASSWORD.
#   2. Create an App Store Connect API key for unattended `pilot`/`deliver`
#      uploads — secrets: APP_STORE_CONNECT_API_KEY_ID,
#      APP_STORE_CONNECT_API_ISSUER_ID, APP_STORE_CONNECT_API_KEY_CONTENT.
#   3. Replace the placeholder step below with the real Fastlane lane (build
#      + `pilot` upload to TestFlight), feeding it $MARKETING_VERSION /
#      $BUILD_NUMBER from the "Derive version from tag" step — e.g. via
#      xcodebuild's MARKETING_VERSION=/CURRENT_PROJECT_VERSION= build
#      setting overrides, or fastlane's `increment_version_number(
#      version_number: ENV["MARKETING_VERSION"])` / `increment_build_number(
#      build_number: ENV["BUILD_NUMBER"])`. Then flip `if: false` to `if:
#      true`.
#
# Versioning mirrors android-release.yml: tag -> CFBundleShortVersionString
# directly, and CFBundleVersion (build number) from a Unix timestamp in
# minutes (epoch / 60), same encoding as Android's versionCode — not tag
# derived, since Apple requires CFBundleVersion to strictly increase on
# every upload to App Store Connect, even repeat uploads for the same tag
# (e.g. fixing a rejected TestFlight build without cutting a new tag).
# iOS has no equivalent of Play Store's 2,100,000,000 versionCode ceiling,
# so minutes aren't required here the way they are for Android — kept
# anyway so both workflows use one mental model instead of two.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    if: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web assets (native config)
        working-directory: frontend
        run: |
          cp .env.native.example .env.native
          set -a && source .env.native && set +a
          npm run build

      - name: Sync Capacitor iOS project
        working-directory: frontend
        run: npx cap sync ios

      # No tag (workflow_dispatch test run) -> MARKETING_VERSION stays empty;
      # whatever real build step replaces the placeholder below should treat
      # that the same way android-release.yml treats an empty gradle_args —
      # skip publishing rather than uploading a fake version to TestFlight.
      - name: Derive version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "marketing_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "marketing_version=" >> "$GITHUB_OUTPUT"
          fi
          echo "build_number=$(( $(date -u +%s) / 60 ))" >> "$GITHUB_OUTPUT"

      - name: Build, sign and upload to TestFlight
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.marketing_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          echo "Not yet configured — needs Fastlane + an Apple Developer" \
               "Program account. See the comment block at the top of" \
               "ios-release.yml."
          exit 1
