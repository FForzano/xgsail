name: Edge Firmware Build

on:
  push:
    branches: [main]
    paths:
      - 'edge-e/firmware/sailframes_edge/**'
      - '.github/workflows/firmware-edge.yml'
  pull_request:
    paths:
      - 'edge-e/firmware/sailframes_edge/**'
      - '.github/workflows/firmware-edge.yml'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Compile sailframes_edge (unified E + B firmware)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR="$HOME/bin" sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index

      - name: Install ESP32 core 3.3.7 (pinned — 3.3.8 breaks I2C/TFT)
        run: arduino-cli core install esp32:esp32@3.3.7

      - name: Install libraries (versions pinned per CLAUDE.md)
        run: |
          arduino-cli lib install "NimBLE-Arduino@2.4.0"
          arduino-cli lib install "Adafruit BusIO@1.17.4"
          arduino-cli lib install "Adafruit GFX Library@1.12.6"
          arduino-cli lib install "Adafruit BNO08x@1.2.5"
          arduino-cli lib install "Adafruit DPS310@1.1.3"
          arduino-cli lib install "TFT_eSPI"

      - name: Install TFT_eSPI User_Setup.h
        run: |
          TFT_LIB="$HOME/Arduino/libraries/TFT_eSPI"
          if [ ! -d "$TFT_LIB" ]; then
            echo "TFT_eSPI library not found at $TFT_LIB"
            ls -la "$HOME/Arduino/libraries/"
            exit 1
          fi
          cp edge-e/firmware/sailframes_edge/User_Setup.h "$TFT_LIB/User_Setup.h"
          echo "Installed User_Setup.h into $TFT_LIB"

      - name: Extract firmware versions (E + B are versioned independently)
        id: version
        run: |
          INO=edge-e/firmware/sailframes_edge/sailframes_edge.ino
          V_E=$(grep '#define FW_VERSION' "$INO" | grep 'E (LG290P)'  | sed 's/.*"\([^"]*\)".*/\1/')
          V_B=$(grep '#define FW_VERSION' "$INO" | grep 'B (LC29HEA)' | sed 's/.*"\([^"]*\)".*/\1/')
          if [ -z "$V_E" ] || [ -z "$V_B" ]; then
            echo "Failed to extract E/B FW_VERSION (check the #ifdef BUILD_B1 block + platform comments)"
            exit 1
          fi
          echo "version_e=$V_E" >> "$GITHUB_OUTPUT"
          echo "version_b=$V_B" >> "$GITHUB_OUTPUT"
          echo "E firmware: $V_E   B firmware: $V_B"

      # Two binaries from one source: E (LG290P, default) and B1 (LC29HEA,
      # -DBUILD_B1). They are NOT interchangeable — GPIO19 is TFT_BL on E but
      # PWR_HOLD (self-power latch) on B, and the TFT driver differs — so each
      # boat's OTA manifest must point at its own variant (handled below).
      - name: Compile E firmware (min_spiffs partition for OTA)
        run: |
          mkdir -p build_e
          arduino-cli compile \
            --fqbn 'esp32:esp32:esp32:PartitionScheme=min_spiffs,FlashSize=4M,FlashFreq=80,FlashMode=qio,CPUFreq=240,UploadSpeed=921600' \
            --output-dir build_e \
            --warnings none \
            edge-e/firmware/sailframes_edge

      - name: Compile B1 firmware (-DBUILD_B1)
        run: |
          mkdir -p build_b1
          arduino-cli compile \
            --fqbn 'esp32:esp32:esp32:PartitionScheme=min_spiffs,FlashSize=4M,FlashFreq=80,FlashMode=qio,CPUFreq=240,UploadSpeed=921600' \
            --build-property 'compiler.cpp.extra_flags=-DBUILD_B1' \
            --output-dir build_b1 \
            --warnings none \
            edge-e/firmware/sailframes_edge

      - name: Report + check binary sizes
        run: |
          MAX=1966080  # 1.9MB OTA partition limit
          for VAR in E:build_e B1:build_b1; do
            NAME=${VAR%%:*}; DIR=${VAR##*:}
            SIZE=$(stat -c%s "$DIR/sailframes_edge.ino.bin")
            PCT=$(awk "BEGIN { printf \"%.1f\", ($SIZE / $MAX) * 100 }")
            echo "$NAME binary: $SIZE bytes (${PCT}% of 1.9MB OTA partition)"
            if [ "$SIZE" -gt "$MAX" ]; then
              echo "::error::$NAME binary exceeds min_spiffs OTA partition (1.9MB)"
              exit 1
            fi
          done

      - name: Rename and hash artifacts
        run: |
          V_E="${{ steps.version.outputs.version_e }}"
          V_B="${{ steps.version.outputs.version_b }}"
          mkdir -p build
          cp build_e/sailframes_edge.ino.bin  "build/sailframes_edge_${V_E}.bin"
          cp build_b1/sailframes_edge.ino.bin "build/sailframes_edge_b1_${V_B}.bin"
          # bootloader + partitions (E variant — reference for a full USB flash)
          cp build_e/sailframes_edge.ino.partitions.bin "build/sailframes_edge_${V_E}.partitions.bin" 2>/dev/null || true
          cp build_e/sailframes_edge.ino.bootloader.bin "build/sailframes_edge_${V_E}.bootloader.bin" 2>/dev/null || true
          cd build
          sha256sum "sailframes_edge_${V_E}.bin"    > "sailframes_edge_${V_E}.bin.sha256"
          sha256sum "sailframes_edge_b1_${V_B}.bin" > "sailframes_edge_b1_${V_B}.bin.sha256"
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edge-firmware-E${{ steps.version.outputs.version_e }}-B${{ steps.version.outputs.version_b }}-${{ github.sha }}
          path: |
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.bin
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.bin.sha256
            build/sailframes_edge_b1_${{ steps.version.outputs.version_b }}.bin
            build/sailframes_edge_b1_${{ steps.version.outputs.version_b }}.bin.sha256
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.partitions.bin
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.bootloader.bin
          retention-days: 90
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.bin
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.bin.sha256
            build/sailframes_edge_b1_${{ steps.version.outputs.version_b }}.bin
            build/sailframes_edge_b1_${{ steps.version.outputs.version_b }}.bin.sha256
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.partitions.bin
            build/sailframes_edge_${{ steps.version.outputs.version_e }}.bootloader.bin

      # OTA manifest publish — only on green main builds (not PRs).
      # Each device GETs firmware/<boat_id>/latest.json. The E and B1 binaries
      # are DIFFERENT and NOT interchangeable (GPIO19 = backlight on E but the
      # PWR_HOLD self-power latch on B), so each fleet's manifest points at its
      # own binary: E1..E6 -> E build, B-fleet -> B1 build.
      - name: Configure AWS credentials (firmware CI user)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_FIRMWARE_CI }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_FIRMWARE_CI }}
          aws-region: us-east-1

      - name: Publish firmware to S3 + update OTA manifests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          V_E="${{ steps.version.outputs.version_e }}"
          V_B="${{ steps.version.outputs.version_b }}"
          BUCKET="sailframes-fleet-data-prod"
          REGION="us-east-1"

          # publish_variant <local-bin> <s3-key> <version> <boat-id>...
          # Skips entirely if this variant's binary is byte-identical to what the
          # fleet already runs (first boat's live manifest sha == new sha) — so a
          # B-only change never re-uploads or re-manifests the unchanged E build.
          # (E/B are versioned independently, so even a non-skip leaves the E
          # manifest version unchanged and the E boats do not re-OTA.)
          publish_variant() {
            local BIN_LOCAL="$1"; local KEY="$2"; local VER="$3"; shift 3
            local SIZE SHA URL MANIFEST B LIVE_SHA
            SIZE=$(stat -c%s "$BIN_LOCAL")
            SHA=$(sha256sum "$BIN_LOCAL" | awk '{print $1}')
            LIVE_SHA=$(aws s3 cp "s3://${BUCKET}/firmware/$1/latest.json" - 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha256',''))" 2>/dev/null || echo "")
            if [ "$LIVE_SHA" = "$SHA" ]; then
              echo "Skip [$*] — already on ${SHA:0:12} (binary unchanged)"; return
            fi
            URL="http://${BUCKET}.s3.${REGION}.amazonaws.com/${KEY}"
            echo "Uploading $BIN_LOCAL -> s3://${BUCKET}/${KEY}"
            aws s3 cp "$BIN_LOCAL" "s3://${BUCKET}/${KEY}" \
              --content-type application/octet-stream \
              --cache-control "max-age=31536000,immutable"
            MANIFEST=$(mktemp)
            printf '{\n  "version": "%s",\n  "url": "%s",\n  "size": %s,\n  "sha256": "%s",\n  "git_sha": "%s",\n  "built_at": "%s"\n}\n' \
              "$VER" "$URL" "$SIZE" "$SHA" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$MANIFEST"
            echo "Manifest for [$*]:"; cat "$MANIFEST"
            for B in "$@"; do
              aws s3 cp "$MANIFEST" "s3://${BUCKET}/firmware/${B}/latest.json" \
                --content-type application/json \
                --cache-control "max-age=60"
              echo "  -> firmware/${B}/latest.json"
            done
          }

          # E fleet -> E binary.  B fleet -> B1 binary. Add new B units (B3, B4,
          # ...) to the B list as they're provisioned with a boat_id.
          publish_variant "build/sailframes_edge_${V_E}.bin"    "firmware/sailframes_edge_${V_E}.bin"    "$V_E" E1 E2 E3 E4 E5 E6
          publish_variant "build/sailframes_edge_b1_${V_B}.bin" "firmware/sailframes_edge_b1_${V_B}.bin" "$V_B" B1 B2
