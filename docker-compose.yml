# SailFrames self-hosted stack: MinIO (S3-compatible storage) + FastAPI.
# Bring up with:  docker compose --env-file .env up -d
# See deploy/README.md.

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Bucket-notification webhook target (live at boot, no restart needed).
      # Fires POST to the api service when objects are created.
      MINIO_NOTIFY_WEBHOOK_ENABLE_SF: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_SF: "http://api:8000/hooks/minio"
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_SF: ${SAILFRAMES_HOOK_TOKEN}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API (firmware/curl uploads land here)
      - "9001:9001"   # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SAILFRAMES_BUCKET: ${SAILFRAMES_BUCKET}
      SAILFRAMES_DATA_PREFIX: ${SAILFRAMES_DATA_PREFIX}
      SAILFRAMES_S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      SAILFRAMES_HOOK_TOKEN: ${SAILFRAMES_HOOK_TOKEN}
      SAILFRAMES_ADMIN_BYPASS: "1"
      # Switch the metadata backend on; the schema is created at startup.
      SAILFRAMES_METADATA_BACKEND: postgres
      # Discrete credentials, not a concatenated DATABASE_URL: avoids holding
      # the password in one plaintext connection-string token and lets
      # SQLAlchemy URL-escape it (web/api/db/__init__.py builds the URL).
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-sailframes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sailframes}
      POSTGRES_DB: ${POSTGRES_DB:-sailframes}
      # Optional bootstrap superadmin (seeded on first startup).
      SAILFRAMES_SUPERADMIN_EMAIL: ${SAILFRAMES_SUPERADMIN_EMAIL:-}
      SAILFRAMES_SUPERADMIN_PASSWORD: ${SAILFRAMES_SUPERADMIN_PASSWORD:-}

    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy

  # One-shot: create bucket, apply anonymous policies, register the
  # ObjectCreated->webhook event on raw/*.csv. Exits when done.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      SAILFRAMES_BUCKET: ${SAILFRAMES_BUCKET}
    entrypoint: ["/bin/sh", "/init/minio-init.sh"]
    volumes:
      - ./deploy/minio-init.sh:/init/minio-init.sh:ro
    restart: "no"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sailframes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sailframes}
      POSTGRES_DB: ${POSTGRES_DB:-sailframes}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sailframes}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  minio-data:
  postgres-data:
